<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #212842;
      font-family: "Segoe UI", sans-serif;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="login-box">
  <h2>Login</h2>

  <form action="/login" method="post">
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <p style="margin-top: 18px; font-size: 14px;">
    Don’t have an account?
    <a href="/register" style="color:#1e40af; text-decoration:none; font-weight:600;">
      Register here
    </a>
  </p>
</div>

</body>
</html>
