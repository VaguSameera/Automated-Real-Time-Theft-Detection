<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield AI | Shoplifting Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #111114 100%);
            --glass-surface: rgba(24, 24, 27, 0.7);
            --glass-border: 1px solid rgba(129, 140, 248, 0.2);
            --accent: #818cf8;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-gradient); color: var(--text-primary);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        nav {
            height: 70px; background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(16px);
            border-bottom: var(--glass-border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 40px; z-index: 1000;
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none; font-weight: 500;
            font-size: 0.85rem; letter-spacing: 1px; padding: 10px 20px;
            border-radius: 8px; transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent); background: rgba(129, 140, 248, 0.1);
            box-shadow: inset 0 0 10px rgba(129, 140, 248, 0.1);
        }

        .content-area { flex: 1; padding: 25px; overflow: hidden; }
        
        /* Global Glass Card */
        .glass-card {
            background: var(--glass-surface); border: var(--glass-border);
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <nav>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:12px; height:12px; background:#ef4444; border-radius:50%; box-shadow: 0 0 12px #ef4444;"></div>
            <span style="font-weight:700; font-size:1.1rem; letter-spacing:1px;">SHIELD <span style="color:var(--accent);">AI</span></span>
        </div>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if active_page == 'home' }}">HOME</a>
            <a href="/detect" class="{{ 'active' if active_page == 'detect' }}">HISTORY</a>
            <a href="/team" class="{{ 'active' if active_page == 'team' }}">TEAM</a>
            <a href="/about" class="{{ 'active' if active_page == 'about' }}">ABOUT</a>
            <a href="#" onclick="confirmLogout()">LOGOUT</a>
        </div>
        <div style="color: #34d399; font-size: 0.75rem; font-weight: 600; background: rgba(52, 211, 153, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(52, 211, 153, 0.2);">
            SYSTEM ACTIVE
        </div>
    </nav>
    <div class="content-area">
        {% block content %}{% endblock %}
    </div>
</body>
<script>
    function confirmLogout() {
        const confirmAction = confirm("Are you sure you want to logout?");
        if (confirmAction) {
            window.location.href = "/logout";
        }
    }
</script>
</html>
