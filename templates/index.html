<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theft Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        :root {
            /* Minimal Dark Palette */
            --bg-gradient: linear-gradient(135deg, #18181b 0%, #1f2023 100%);
            --glass-surface: rgba(30, 30, 35, 0.75);
            --glass-border: 1px solid rgba(129, 140, 248, 0.2);
            --glass-shadow: 0 0 25px rgba(129, 140, 248, 0.15), 0 10px 40px rgba(0,0,0,0.5);
            --text-primary: #e4e4e7;   
            --text-secondary: #a1a1aa; 
            --accent: #818cf8;         
            --accent-glow: rgba(129, 140, 248, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: 1px solid rgba(255, 255, 255, 0.08);
            --text-dark: #18181b; /* New variable for dark text on white bg */
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            color: var(--text-primary);
        }

        /* --- NAV --- */
        nav {
            height: 60px;
            background: rgba(20, 20, 23, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(129, 140, 248, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }
        .app-title { font-weight: 600; font-size: 1rem; letter-spacing: 0.5px; text-shadow: 0 0 10px rgba(255,255,255,0.1); }

        .status-badge { 
            background: rgba(16, 185, 129, 0.1); color: #34d399; 
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }
            100% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
        }

        /* --- WORKSPACE --- */
        .workspace { display: flex; flex: 1; padding: 20px; gap: 20px; height: calc(100vh - 60px); }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px; background: var(--glass-surface); backdrop-filter: blur(20px);
            border-radius: 16px; border: var(--glass-border); box-shadow: var(--glass-shadow);
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Smoother transition */
        }
        
        /* --- VIBRANT GLOW EFFECT (UPDATED) --- */
        .sidebar:hover { 
            border-color: rgba(129, 140, 248, 0.9); /* Brighter Border */
            box-shadow: 
                0 0 20px rgba(129, 140, 248, 0.6),  /* Tight intense glow */
                0 0 50px rgba(129, 140, 248, 0.4);  /* Wide ambient glow */
            transform: translateY(-2px);
        }

        .sidebar-section { margin-bottom: 24px; }
        .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 12px; font-weight: 600; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .info-card { background: var(--card-bg); padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; border: var(--card-border); color: var(--text-primary); word-break: break-all; }

        .upload-trigger {
            background: var(--card-bg); border: 1px dashed rgba(129, 140, 248, 0.3); border-radius: 12px; height: 80px;
            display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: all 0.3s; color: var(--accent);
        }
        
        /* --- VIBRANT BUTTON GLOW (UPDATED) --- */
        .upload-trigger:hover { 
            border-color: var(--accent); 
            background: rgba(129, 140, 248, 0.15); 
            box-shadow: 
                0 0 30px rgba(129, 140, 248, 0.5), 
                inset 0 0 10px rgba(129, 140, 248, 0.3);
            text-shadow: 0 0 8px var(--accent); 
        }

        .log-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 12px; border: var(--card-border); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .log-content { flex: 1; overflow-y: auto; font-family: 'JetBrains Mono', 'Monaco', monospace; font-size: 0.75rem; }
        .log-entry { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #d4d4d8; text-shadow: 0 0 5px rgba(255,255,255,0.1); }
        .log-time { color: var(--accent); margin-right: 8px; text-shadow: 0 0 8px var(--accent); }

        /* --- VIDEO AREA --- */
        .video-container {
            flex: 1; background: var(--glass-surface); backdrop-filter: blur(20px); border-radius: 16px; border: var(--glass-border); box-shadow: var(--glass-shadow); padding: 20px; display: flex; flex-direction: column; position: relative; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* --- VIBRANT GLOW EFFECT (UPDATED) --- */
        .video-container:hover { 
            border-color: rgba(129, 140, 248, 0.9); /* Brighter Border */
            box-shadow: 
                0 0 20px rgba(129, 140, 248, 0.6), 
                0 0 50px rgba(129, 140, 248, 0.4); 
        }

        .video-frame {
            flex: 1; background: #09090b; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); border: 1px solid rgba(129, 140, 248, 0.15);
        }

        img { width: 100%; height: 100%; object-fit: contain; display: block; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        /* --- LOTTIE STYLING (WHITE BACKGROUND) --- */
        .empty-state {
            width: 100%;  /* Fill the black box width */
            height: 100%; /* Fill the black box height */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white; /* Set background to white */
            color: var(--text-dark); /* Change text color to dark */
            text-align: center;
        }
        
        lottie-player {
            width: 100%;
            height: 85%;
            max-width: 800px;
        }

        .video-footer { height: 30px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--text-secondary); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(129, 140, 248, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(129, 140, 248, 0.5); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div style="display:flex; gap:6px; margin-right:15px;">
                <div style="width:10px; height:10px; border-radius:50%; background:#ef4444; border:1px solid rgba(0,0,0,0.2); box-shadow: 0 0 8px #ef4444;"></div>
                <div style="width:10px; height:10px; border-radius:50%; background:#f59e0b; border:1px solid rgba(0,0,0,0.2); box-shadow: 0 0 8px #f59e0b;"></div>
                <div style="width:10px; height:10px; border-radius:50%; background:#10b981; border:1px solid rgba(0,0,0,0.2); box-shadow: 0 0 8px #10b981;"></div>
            </div>
            <span class="app-title">Theft Detection</span>
        </div>
        <div class="status-badge">● System Operational</div>
    </nav>

    <div class="workspace">
        
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="section-title">Video Source</div>
                <div class="info-card">
                    {{ filename if filename else "No Source Selected" }}
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">Controls</div>
                <form action="/" method="post" enctype="multipart/form-data">
                    <label class="upload-trigger">
                        <span style="font-weight:600; font-size:0.9rem;">Click to Upload</span>
                        <span style="font-size:0.75rem; color:var(--text-secondary);">MP4, AVI, MOV</span>
                        <input type="file" name="file" onchange="this.form.submit()" style="display: none;">
                    </label>
                </form>
            </div>

            <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column; margin-bottom: 0;">
                <div class="section-title">Live Logs</div>
                <div class="log-wrapper">
                    <div class="log-content" id="log-window"></div>
                </div>
            </div>
        </aside>

        <main class="video-container">
            <div class="video-frame">
                {% if video_ready %}
                    <img src="{{ url_for('video_feed') }}" alt="Live Feed">
                {% else %}
                    <div class="empty-state">
                        <lottie-player 
                            src="{{ url_for('static', filename='Catch me if you can.json') }}" 
                            background="transparent" 
                            speed="1" 
                            loop 
                            autoplay>
                        </lottie-player>
                        <div style="margin-top: 0px; font-weight: 500; letter-spacing: 1px;">WAITING FOR INPUT SIGNAL...</div>
                    </div>
                {% endif %}
            </div>
            <div class="video-footer">
                <span>Model: YOLOv8 Nano</span>
                <span>Latency: 14ms</span>
            </div>
        </main>

    </div>

    <script>
        const logs = document.getElementById('log-window');
        const msgs = ["Buffer synchronized...", "Checking frame integrity...", "Object detection: Active", "Confidence score: 88%", "Rendering overlay...", "Stream optimized.", "Analyzing vector patterns..."];
        function addLog() {
            const div = document.createElement('div'); div.className = 'log-entry';
            const now = new Date(); const time = now.toLocaleTimeString('en-US', {hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            div.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            logs.prepend(div);
            if(logs.children.length > 50) logs.lastChild.remove();
        }
        setInterval(addLog, 1500);
    </script>
</body>
</html>
