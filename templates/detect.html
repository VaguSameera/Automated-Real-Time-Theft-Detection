{% extends "layout.html" %}
{% block content %}
<div class="glass-card" style="height: 100%; display: flex; flex-direction: column; padding: 30px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <h2 style="margin: 0; color: var(--accent); letter-spacing: 1px;">INCIDENT HISTORY</h2>
            <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: var(--text-secondary);">Visual proof captured for every unique detection.</p>
        </div>
        <div id="log-counter" style="background: rgba(129, 140, 248, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.85rem;">
            Total Events: 0
        </div>
    </div>
    
    <div style="flex: 1; overflow-y: auto; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead style="position: sticky; top: 0; background: #0f0f12; z-index: 10;">
                <tr style="border-bottom: 1px solid var(--glass-border); color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase;">
                    <th style="padding: 20px;">Timestamp</th>
                    <th>Classification</th>
                    <th>Confidence</th>
                    <th>Visual Evidence</th>
                </tr>
            </thead>
            <tbody id="incident-table" style="font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;">
                </tbody>
        </table>
    </div>
</div>

<script>
    let lastLoggedIndex = 0;

    function fetchUpdates() {
        fetch(`/get_detections?after=${lastLoggedIndex}`)
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById('incident-table');
                const counter = document.getElementById('log-counter');
                
                if (data.logs.length > 0) {
                    data.logs.forEach(log => {
                        const row = table.insertRow(0); // Add newest to top
                        row.style.borderBottom = "1px solid rgba(255,255,255,0.03)";
                        row.style.animation = "slideIn 0.3s ease-out forwards";
                        
                        row.innerHTML = `
                            <td style="padding: 18px; color: var(--accent);">${log.time}</td>
                            <td style="color: #ef4444; font-weight: 700;">🚨 SHOPLIFTING DETECTED</td>
                            <td style="color: var(--text-primary);">${log.conf}%</td>
                            <td style="padding: 10px;">
                                <div style="width: 110px; height: 65px; border-radius: 8px; overflow: hidden; border: 2px solid rgba(239, 68, 68, 0.3); background: #000; box-shadow: 0 0 10px rgba(239,68,68,0.1);">
                                    <img src="/static/detections/${log.image}" 
                                         style="width: 100%; height: 100%; object-fit: cover; cursor: zoom-in;" 
                                         onclick="window.open(this.src)"
                                         title="Click to view full image">
                                </div>
                            </td>
                        `;
                    });
                    
                    lastLoggedIndex = data.total_count;
                    counter.innerText = `Total Events: ${lastLoggedIndex}`;
                }
            })
            .catch(err => console.error("Sync Error:", err));
    }

    fetchUpdates();
    setInterval(fetchUpdates, 2000);
</script>

<style>
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    #incident-table tr:hover { background: rgba(129, 140, 248, 0.03); }
    div::-webkit-scrollbar { width: 6px; }
    div::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
</style>
{% endblock %}
